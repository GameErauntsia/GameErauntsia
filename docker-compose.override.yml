services:
  db:
    ports:
      - 3306:3306
    env_file:
      - backup.env
      - matomo.env
    volumes:
      - ./db/init-scripts:/docker-entrypoint-initdb.d:ro
  web:
    image: gamerauntsia/web:dev
    build:
      context: .
      target: "development"
    environment:
      - DEBUG=True
    volumes:
      - .:/app/code
  proxy:
    extra_hosts:
      - "matomo:0.0.0.0"
    ports:
      - 80:80
